simulation:
  schedulers:
  - static
  - dynamic_adab
  - dynamic_acab
  - dynamic_aimd
  #- rl
  min_buoys: 10
  max_buoys: 80
  step_buoys: 10
  intervals:
  - 1.0
  - 0.5
  - 0.25
  duration: 600
  num_processes: 4
  ideal_channel: false
  ramp_scenario: false
  enable_metrics: true
  enable_logging: false
  multihop_mode: none  # Options: none, append, forwarded
  multihop_limit: 2    # Maximum hops for forwarded mode
world:
  width: 800.0
  height: 800.0
buoys:
  mobile_percentage: 0.2
  default_battery: 100.0
  default_velocity: 15.0
network:
  bit_rate: 1000000
  speed_of_light: 300000000.0
  communication_range_max: 120.0
  communication_range_high_prob: 70.0
  delivery_prob_high: 0.9
  delivery_prob_low: 0.15
csma:
  slot_time: 2.0e-05
  difs_time: 5.0e-05
  cw: 16
  backoff_time_min: 0.001
  backoff_time_max: 0.016
scheduler:
  beacon_min_interval: 1.0
  beacon_max_interval: 5.0
  static_interval: 1.0


energy:
  # Enable energy modeling for AIMD protocol
  enable_for_protocols: ['dynamic_aimd']  # e.g., ['rl'] or empty list to disable for all
  # Energy costs in Joules
  transmission_energy: 0.0044  # 4.4 mJ per beacon (500 bytes at 1 Mbps with 4.4ms airtime, 1W TX power)
  reception_energy: 0.000088  # 88 µJ per second of reception (typical for Wi-Fi receiver ~99 mW)
  idle_listening_energy: 0.000088  # 88 µJ per second of idle listening
  # When battery <= 0, buoy becomes inactive (cannot transmit or receive)
  min_battery_threshold: 0.0
